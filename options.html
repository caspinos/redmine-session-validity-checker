<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="optionsTitle"></title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #169;
      padding-bottom: 10px;
    }
    .section {
      margin: 20px 0;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
    }
    label {
      display: block;
      margin: 10px 0 5px 0;
      font-weight: bold;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .domain-list {
      margin-top: 10px;
    }
    .domain-item {
      display: flex;
      align-items: center;
      margin: 5px 0;
      padding: 8px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 3px;
    }
    .domain-item span {
      flex: 1;
      font-family: monospace;
    }
    .domain-item button {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      margin-left: 10px;
    }
    .domain-item button:hover {
      background: #b71c1c;
    }
    .add-domain {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .add-domain input {
      flex: 1;
    }
    .add-domain button {
      background: #169;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 14px;
    }
    .add-domain button:hover {
      background: #0d5a8f;
    }
    .save-button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    .save-button:hover {
      background: #45a049;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1 data-i18n="optionsTitle"></h1>
  
  <div class="section">
    <label for="mode" data-i18n="modeLabel"></label>
    <select id="mode">
      <option value="blacklist" data-i18n="blacklistMode"></option>
      <option value="whitelist" data-i18n="whitelistMode"></option>
    </select>
    <div class="help-text">
      <span data-i18n="blacklistHelp"></span>
      <br>
      <span data-i18n="whitelistHelp"></span>
    </div>
  </div>

  <div class="section">
    <label data-i18n="domainsLabel"></label>
    <div class="help-text" data-i18n="domainsHelp"></div>
    
    <div class="domain-list" id="domainList"></div>
    
    <div class="add-domain">
      <input type="text" id="newDomain" placeholder="example.com or *.example.com" data-i18n-placeholder="domainPlaceholder">
      <button id="addDomain" data-i18n="addButton"></button>
    </div>
  </div>

  <button class="save-button" id="saveButton" data-i18n="saveButton"></button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
